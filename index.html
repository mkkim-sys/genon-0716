<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>신규입사자 좌석 배치도 (글자 크기 최적화)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --highlight-color: #f59e0b;
            --bg-color: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --success-color: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { overflow-x: hidden; }
        body { background-color: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Noto Sans KR', sans-serif; }

        /* 모바일 대응: 실제 슬라이드는 1280x720 고정 크기를 유지하고,
           바깥 stage가 화면 크기에 맞춰 스케일된 만큼만 자리를 차지하도록 함 */
        .stage { position: relative; }

        .slide-container {
            width: 1280px; height: 720px; background-color: var(--bg-color);
            position: absolute; top: 0; left: 0; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; border-radius: 12px;
            transform-origin: top left;
        }

        .view { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 50px 80px; display: flex; flex-direction: column; background: white; z-index: 10; }
        .view.hidden { display: none !important; }

        header { margin-bottom: 28px; border-bottom: 2px solid var(--border-color); padding-bottom: 18px; display: flex; justify-content: space-between; align-items: flex-end; min-height: 80px; }
        .title-group h1 { font-size: 38px; color: var(--text-main); font-weight: 700; }
        .title-group p { font-size: 16px; color: var(--text-muted); margin-top: 4px; }

        .controls { display: flex; gap: 10px; align-items: center; }
        .btn { padding: 10px 18px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 8px; border: none; transition: all 0.2s ease; font-family: 'Noto Sans KR', sans-serif; }
        .btn-download { background-color: var(--success-color); color: white; }
        .btn-download:hover { background-color: #059669; }
        .btn-edit { background-color: #f1f5f9; color: var(--text-main); border: 1px solid var(--border-color); }
        .btn-edit:hover { background-color: #e2e8f0; }
        .btn-edit.active { background-color: var(--primary-color); color: white; border-color: var(--primary-color); }
        .btn-back { background-color: var(--text-main); color: white; }

        .edit-badge {
            display: none;
            position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
            background: #fef3c7; color: #92400e; border: 1px solid #fde68a;
            font-size: 12px; font-weight: 600; padding: 4px 14px; border-radius: 20px;
            z-index: 100;
        }
        .edit-badge.visible { display: block; }

        .chart-area { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 28px; }
        .table-rect { width: 700px; height: 180px; background: #f1f5f9; border: 3px solid var(--border-color); border-radius: 15px; box-shadow: inset 0 4px 10px rgba(0,0,0,0.03); }
        .seat-row { display: flex; gap: 48px; }

        .seat-circle {
            width: 100px; height: 100px; background: var(--primary-color); border-radius: 50%;
            display: flex; justify-content: center; align-items: center; color: white;
            font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 8px 15px -3px rgba(59, 130, 246, 0.3); border: 4px solid white;
            overflow: hidden; user-select: none;
        }
        .seat-circle:hover { transform: scale(1.08); box-shadow: 0 12px 20px -3px rgba(59, 130, 246, 0.4); }
        .seat-circle.empty { background: var(--primary-color); box-shadow: 0 8px 15px -3px rgba(59, 130, 246, 0.3); cursor: pointer; }

        .seat-circle.empty:hover { transform: scale(1.08); box-shadow: 0 12px 20px -3px rgba(203,213,225,0.6); }
        .seat-circle.highlight { background: var(--highlight-color); box-shadow: 0 8px 15px -3px rgba(245, 158, 11, 0.3); }

        .seat-number {
            width: 100%; text-align: center;
            white-space: pre-wrap; word-break: keep-all;
            line-height: 1.25; padding: 5px;
            pointer-events: none;
        }
        /* 편집모드일 때만 contenteditable 활성화 */
        body.edit-mode .seat-number { pointer-events: auto; cursor: text; }
        body.edit-mode .seat-circle:hover { transform: none; }

        /* 모달 */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.45); z-index: 200;
            justify-content: center; align-items: center;
        }
        .modal-overlay.visible { display: flex; }
        .modal {
            background: white; border-radius: 16px; padding: 36px;
            width: 380px; max-width: 90vw; box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            display: flex; flex-direction: column; gap: 20px;
        }
        .modal h3 { font-size: 18px; font-weight: 700; color: var(--text-main); }
        .modal label { font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; display: block; }
        .modal input, .modal textarea {
            width: 100%; border: 1px solid var(--border-color); border-radius: 8px;
            padding: 10px 12px; font-size: 15px; font-family: 'Noto Sans KR', sans-serif;
            color: var(--text-main); outline: none; transition: border 0.2s;
        }
        .modal input:focus, .modal textarea:focus { border-color: var(--primary-color); }
        .modal textarea { resize: vertical; min-height: 80px; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
        .btn-cancel { background: #f1f5f9; color: var(--text-main); border: 1px solid var(--border-color); }
        .btn-save { background: var(--primary-color); color: white; }
        .btn-save:hover { background: var(--primary-hover); }

        /* 상세 페이지 */
        .detail-content { flex-grow: 1; display: grid; grid-template-columns: 1fr 2fr; gap: 60px; align-items: start; padding-top: 20px; }
        .detail-visual { background: #f8fafc; border-radius: 20px; height: 340px; display: flex; justify-content: center; align-items: center; border: 1px solid var(--border-color); }
        .large-seat {
            width: 210px; height: 210px; background: var(--primary-color); border-radius: 50%;
            display: flex; justify-content: center; align-items: center; color: white;
            font-size: 22px; font-weight: 700; padding: 20px; text-align: center;
            box-shadow: 0 20px 30px rgba(59, 130, 246, 0.2);
            white-space: pre-wrap; word-break: keep-all; line-height: 1.3;
        }
        .large-seat.highlight { background: var(--highlight-color); box-shadow: 0 20px 30px rgba(245, 158, 11, 0.2); }
        .large-seat.highlight-blue { background: #2563eb; box-shadow: 0 20px 30px rgba(37, 99, 235, 0.35); border: 4px solid #93c5fd; }

        .info-container { display: flex; flex-direction: column; gap: 36px; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .info-box { background: #f1f5f9; padding: 22px; border-radius: 12px; }
        .info-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; font-weight: 700; outline: none; }
        .info-value { font-size: 18px; font-weight: 600; color: var(--text-main); outline: none; }
        .editable-area {
            font-size: 15px; color: var(--text-main); min-height: 280px; outline: none;
            line-height: 1.7; border: 1px dashed var(--border-color); border-radius: 12px;
            padding: 20px; background: #ffffff; white-space: pre-wrap;
        }
        /* 상세페이지는 편집모드와 무관하게 항상 편집 가능 */
        #detail-view .info-label,
        #detail-view .info-value,
        #detail-view .editable-area { cursor: text; }
    </style>
</head>
<body class="">

    <!-- 모달 -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h3>좌석 정보 편집</h3>
            <div>
                <label>이름 / 표시</label>
                <input type="text" id="modal-display" placeholder="예) 홍길동 프로">
            </div>
            <div>
                <label>소속</label>
                <input type="text" id="modal-role" placeholder="예) Agent개발그룹">
            </div>
            <div>
                <label>상세 내용</label>
                <textarea id="modal-desc" rows="4" placeholder="경력, 온보딩 현황 등"></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="closeModal()">취소</button>
                <button class="btn btn-save" onclick="saveModal()">저장</button>
            </div>
        </div>
    </div>

    <div class="stage" id="stage">
        <div class="slide-container" id="slide-container">
            <!-- VIEW 1: MAIN SEATING CHART -->
            <div id="main-view" class="view">
                <div class="edit-badge" id="edit-badge">✏️ 편집 모드</div>
                <header>
                    <div class="title-group">
                        <h1 id="main-title">신규입사자 좌석 배치도</h1>
                        <p id="main-subtitle"></p>
                    </div>
                    <div class="controls">
                        <button class="btn btn-edit" id="edit-btn" onclick="toggleEditMode()">
                            <i class="fa-solid fa-pen"></i> 편집
                        </button>
                        <button class="btn btn-download" onclick="downloadSlide()">
                            <i class="fa-solid fa-file-arrow-down"></i> 다운로드
                        </button>
                    </div>
                </header>
                <div class="chart-area">
                    <div class="seat-row" id="top-row"><div>
                        <div class="seat-circle " id="seat-1" onclick="handleSeatClick('1')">
                            <span class="seat-number" id="seat-display-1">강석운 프로 (사업개발)</span>
                        </div>
                    </div><div>
                        <div class="seat-circle " id="seat-2" onclick="handleSeatClick('2')">
                            <span class="seat-number" id="seat-display-2">박상웅 프로  (AI Eng.)</span>
                        </div>
                    </div><div>
                        <div class="seat-circle " id="seat-3" onclick="handleSeatClick('3')">
                            <span class="seat-number" id="seat-display-3">신민성 프로  (PE)</span>
                        </div>
                    </div><div>
                        <div class="seat-circle " id="seat-4" onclick="handleSeatClick('4')">
                            <span class="seat-number" id="seat-display-4">온지석 프로 (프로덕트운영파트)</span>
                        </div>
                    </div></div>
                    <div class="table-rect"></div>
                    <div class="seat-row" id="bottom-row"><div>
                        <div class="seat-circle empty" id="seat-5" onclick="handleSeatClick('5')">
                            <span class="seat-number" id="seat-display-5"></span>
                        </div>
                    </div><div>
                        <div class="seat-circle" id="seat-6" onclick="handleSeatClick('6')">
                            <span class="seat-number" id="seat-display-6">김재진 프로 (FDE)</span>
                        </div>
                    </div><div>
                        <div class="seat-circle " id="seat-7" onclick="handleSeatClick('7')">
                            <span class="seat-number" id="seat-display-7">사재빈 (FDE G.Eng)</span>
                        </div>
                    </div><div>
                        <div class="seat-circle empty" id="seat-8" onclick="handleSeatClick('8')">
                            <span class="seat-number" id="seat-display-8"></span>
                        </div>
                    </div></div>
                </div>
            </div>

            <!-- VIEW 2: DETAIL PAGE -->
            <div id="detail-view" class="view hidden">
                <header style="border-bottom: none; margin-bottom: 0;">
                    <div></div>
                    <button class="btn btn-back" onclick="goBack()">
                        <i class="fa-solid fa-arrow-left"></i> 배치도로 돌아가기
                    </button>
                </header>
                <div class="detail-content">
                    <div class="detail-visual">
                        <div class="large-seat" id="detail-seat-id">장원석 G.Eng FDE</div>
                    </div>
                    <div class="info-container">
                        <div class="info-grid">
                            <div class="info-box">
                                <div class="info-label">이름</div>
                                <div class="info-value" id="detail-name" contenteditable="true">장원석 G.Eng FDE</div>
                            </div>
                            <div class="info-box">
                                <div class="info-label">소속</div>
                                <div class="info-value" id="detail-role" contenteditable="true">FDE 파트</div>
                            </div>
                        </div>
                        <div id="detail-desc" class="editable-area" contenteditable="true">25.06 ~ 25.11 청년취업사관학교<br>22.01~22.12  삼성 AI 아카데미 <br><br>22.02 울산대학교 IT융합전공 졸업</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script id="data-script">
        let seatData = {
    "config": {
        "title": "신규입사자 좌석 배치도",
        "subtitle": ""
    },
    "seats": {
        "1": {
            "display": "강석운 프로 (사업개발)",
            "name": "강석운 프로 (사업개발)",
            "role": "사업개발파트",
            "desc": "코오롱베니트 책임 2024.12 ~ 2026.05\n티맥스에이아이 영업대표 2022.04 ~ 2024.11\n\n숭실대학교 중어중문학 2022 졸업"
        },
        "2": {
            "display": "박상웅 프로  (AI Eng.)",
            "name": "박상웅 프로  (AI Eng.)",
            "role": "AI Core 2파트",
            "desc": "주식회사디카르고\n2025.08 - 재직중 (11개월) 정규직 AI 엔지니어 매니저\n\n주식회사비멕스(BMEKSCo.,Ltd.)\n2023.04 - 2024.12 (1년 9개월) 정규직 AI 엔지니어 연구원\n\n(주)에스앤케이인스티튜트\n2022.01 - 2023.02 (1년 2개월) 정규직 AI 엔지니어 주임연구원\n\n광운대학교 화학공학과 2020.02 졸업"
        },
        "3": {
            "display": "신민성 프로  (PE)",
            "name": "신민성 프로  (PE)",
            "role": "백엔드파트",
            "desc": "두다지\n2023.02 - 재직중 (3년)\n\n스마트레이더시스템\n2021.07 - 2023.02 (1년 8개월)\n\n고려대학교\n2015.03 - 2021.02 졸업 기계공학과"
        },
        "4": {
            "display": "온지석 프로 (프로덕트운영파트)",
            "name": "온지석 프로 (프로덕트운영파트)",
            "role": "FDE",
            "desc": "딥메디 2025.07 - 재직중 (11개월) 정규직 QA Engineer\n한국정보통신기술협회 2023.04 - 2025.03 (2년) 계약직\n\n우석대 컴퓨터공학 2022.02 졸업"
        },
        "5": {
            "display": "",
            "name": "",
            "role": "",
            "desc": ""
        },
        "6": {
            "display": "김재진 프로 (FDE)",
            "name": "김재진 프로 (FDE)",
            "role": "FDE파트",
            "desc": "김언태프로 추천인력\n\n신세계아이앤씨 2022.11 ~ 2026.05\nIEA 2025.09 ~ 재직중\nEasyAI 2023.07 ~ 2024.06\n\n\n한동대학교 언어학/컴퓨터공학 2023.08 졸업"
        },
        "7": {
            "display": "사재빈 (FDE G.Eng)",
            "name": "사재빈 (FDE G.Eng)",
            "role": "FDE파트",
            "desc": "26.01~ 현재 삼성 SW 아카데미 \n24.07~25.10  인이지 \n\n24.02 고려대 디지털경영학 졸업"
        },
        "8": {
            "display": "",
            "name": "",
            "role": "",
            "desc": ""
        }
    }
};

        let currentSeatId = "1";
        let isEditMode = false;
        let modalTargetId = null;

        function initChart() {
            const topRow = document.getElementById('top-row');
            const bottomRow = document.getElementById('bottom-row');
            topRow.innerHTML = '';
            bottomRow.innerHTML = '';

            document.getElementById('main-title').innerText = seatData.config.title;
            document.getElementById('main-subtitle').innerText = seatData.config.subtitle;

            for (let i = 1; i <= 8; i++) {
                const seatInfo = seatData.seats[i.toString()];
                const isEmpty = !seatInfo.display.trim();
                const container = document.createElement('div');
                container.innerHTML = `
                    <div class="seat-circle ${isEmpty ? 'empty' : ''}" id="seat-${i}" onclick="handleSeatClick('${i}')">
                        <span class="seat-number" id="seat-display-${i}">${isEmpty ? '' : seatInfo.display}</span>
                    </div>
                `;
                if (i <= 4) topRow.appendChild(container);
                else bottomRow.appendChild(container);
            }
        }

        function toggleEditMode() {
            isEditMode = !isEditMode;
            document.body.classList.toggle('edit-mode', isEditMode);
            document.getElementById('edit-btn').classList.toggle('active', isEditMode);
            document.getElementById('edit-badge').classList.toggle('visible', isEditMode);
        }

        function handleSeatClick(id) {
            const seatInfo = seatData.seats[id];
            const isEmpty = !seatInfo.display.trim();
            if (isEditMode || isEmpty) {
                // 편집모드이거나 빈 자리면 팝업으로 편집
                modalTargetId = id;
                document.getElementById('modal-display').value = seatInfo.display || '';
                document.getElementById('modal-role').value = seatInfo.role;
                document.getElementById('modal-desc').value = seatInfo.desc;
                document.getElementById('modal-overlay').classList.add('visible');
            } else {
                // 뷰어모드 + 내용 있는 자리: 상세 페이지로 이동
                goToDetail(id);
            }
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.remove('visible');
            modalTargetId = null;
        }

        function saveModal() {
            if (!modalTargetId) return;
            const display = document.getElementById('modal-display').value.trim();
            const role = document.getElementById('modal-role').value.trim();
            const desc = document.getElementById('modal-desc').value.trim();
            seatData.seats[modalTargetId].display = display;
            seatData.seats[modalTargetId].name = display;
            seatData.seats[modalTargetId].role = role;
            seatData.seats[modalTargetId].desc = desc;

            const span = document.getElementById(`seat-display-${modalTargetId}`);
            if (span) span.innerText = display;
            const circle = document.getElementById(`seat-${modalTargetId}`);
            if (circle) {
                if (display) circle.classList.remove('empty');
                else circle.classList.add('empty');
            }
            closeModal();
        }

        function goToDetail(id) {
            currentSeatId = id;
            const data = seatData.seats[id];
            const detailCircle = document.getElementById('detail-seat-id');
            detailCircle.innerText = data.display;
            detailCircle.className = 'large-seat';

            document.getElementById('detail-name').innerText = data.name;
            document.getElementById('detail-role').innerText = data.role;
            document.getElementById('detail-desc').innerText = data.desc;

            document.getElementById('main-view').classList.add('hidden');
            document.getElementById('detail-view').classList.remove('hidden');
        }

        function saveCurrentDetail() {
            if (document.getElementById('detail-view').classList.contains('hidden')) return;
            seatData.seats[currentSeatId].name = document.getElementById('detail-name').innerText;
            seatData.seats[currentSeatId].role = document.getElementById('detail-role').innerText;
            seatData.seats[currentSeatId].desc = document.getElementById('detail-desc').innerText;
        }

        function goBack() {
            saveCurrentDetail();
            document.getElementById('detail-view').classList.add('hidden');
            document.getElementById('main-view').classList.remove('hidden');
            initChart();
        }

        function downloadSlide() {
            saveCurrentDetail();
            seatData.config.title = document.getElementById('main-title').innerText;
            seatData.config.subtitle = document.getElementById('main-subtitle').innerText;

            let htmlContent = document.documentElement.outerHTML;
            const dataRegex = /let seatData = \{[\s\S]*?\};/;
            const newDataString = `let seatData = ${JSON.stringify(seatData, null, 4)};`;
            htmlContent = htmlContent.replace(dataRegex, newDataString);

            const blob = new Blob([htmlContent], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '신규입사자_좌석배치도_최종.html';
            a.click();
            URL.revokeObjectURL(url);
        }

        // ESC로 모달 닫기
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

        // 모바일/작은 화면에서도 1280x720 슬라이드가 전부 보이도록 화면 크기에 맞춰 스케일 조정
        function fitSlide() {
            const stage = document.getElementById('stage');
            const slide = document.getElementById('slide-container');
            const scale = Math.min(window.innerWidth / 1280, window.innerHeight / 720, 1);
            slide.style.transform = `scale(${scale})`;
            stage.style.width = (1280 * scale) + 'px';
            stage.style.height = (720 * scale) + 'px';
        }
        window.addEventListener('resize', fitSlide);

        window.onload = function () {
            initChart();
            fitSlide();
        };
    </script>

</body>
</html>
